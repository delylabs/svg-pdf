name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v7
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - run: npm ci

            - run: npm run build
            - run: npm run typecheck
            - run: npm run lint
            - run: npm run lint:comments
            - run: npm run format:check
            - run: npm run test
            - run: npm run test:visual
