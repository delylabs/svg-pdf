<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
    <!-- An invalid stroke-width/stroke-linecap/stroke-linejoin on the polyline must fall back to the inherited (round, width 8) values from the group, not NaN or an unchecked pass-through -->
    <g stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
        <polyline
            points="20,80 40,20 60,80"
            fill="none"
            stroke="#000000"
            stroke-width="not-a-number"
            stroke-linecap="flat"
            stroke-linejoin="pointy"
        />
    </g>
</svg>
