<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120">
    <!-- Unscaled reference rectangle: stroke-width=4 -->
    <rect x="10" y="20" width="30" height="80" fill="none" stroke="#2980b9" stroke-width="4" />

    <!-- Scaled 2x without non-scaling-stroke: stroke scales to 8 -->
    <g transform="translate(60, 20) scale(2)">
        <rect x="0" y="0" width="15" height="40" fill="none" stroke="#e74c3c" stroke-width="4" />
    </g>

    <!-- Scaled 2x with non-scaling-stroke: stroke stays at 4 -->
    <g transform="translate(130, 20) scale(2)">
        <rect x="0" y="0" width="15" height="40" fill="none" stroke="#27ae60" stroke-width="4" vector-effect="non-scaling-stroke" />
    </g>
</svg>
