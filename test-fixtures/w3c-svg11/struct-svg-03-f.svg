  <!-- Test nested svg elements. Passed if there are two green rectangles visible, and no red. -->
  <title id="test-title">struct-svg-03-f.svg</title>
  <g id="test-body-content" font-family="sans-serif" font-size="18">

    <rect x="0.5" y="0.5" width="99" height="99" fill="red"/>
    <svg width="100" height="100" viewBox="0 0 50 50">
      <rect width="50" height="50" fill="lime"/>
    </svg>

    <g transform="translate(120 0)">
      <rect x="0.5" y="0.5" width="99" height="99" fill="red"/>
      <svg width="100" height="100" viewBox="0 0 50 50">
        <svg width="50" height="50" viewBox="0 0 200 200">
          <rect width="200" height="200" fill="lime"/>
        </svg>
      </svg>
    </g>
  </g>
  <rect id="test-frame" x="1" y="1" width="478" height="358" fill="none" stroke="#000"/>
</svg>
