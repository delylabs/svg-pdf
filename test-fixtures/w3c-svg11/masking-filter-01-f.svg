  <!--=  See http://www.w3.org/Consortium/Legal/.                          =-->
  <!--======================================================================-->
  <!--
    NOT expected to render correctly with svg-pdf: filter="url(#...)" is a
    genuine PDF vector limitation (see README), and this test also nests it
    inside a <mask> (itself unsupported). Kept as a regression fixture to
    confirm both degrade gracefully (warned and skipped) rather than crashing.
  -->
  <title id="test-title">masking-filter-01-f.svg</title>
  <g id="test-body-content" font-family="sans-serif" font-size="18">
    <g shape-rendering="geometricPrecision">
      <text font-size="18" x="10" y="35">Testing 'filter' applied to 'mask'</text>

      <defs>
        <filter id="f" x="0" y="0" width="200" height="200"
                filterUnits="userSpaceOnUse" filterPrimitiveUnits="userSpaceOnUse">
          <feOffset dx="100" dy="100"/>
        </filter>
        <mask id="m" x="0" y="0" width="200" height="200"
              maskUnits="userSpaceOnUse" maskContentUnits="userSpaceOnUse"
              filter="url(#f)">
          <rect width="100" height="100" fill="white"/>
        </mask>
      </defs>

      <g mask="url(#m)" transform="translate(10,50)">
        <rect width="100" height="100" fill="green"/>
        <rect x="101" y="101" width="99" height="99" fill="red"/>
      </g>
    </g>
  </g>
  <rect id="test-frame" x="1" y="1" width="478" height="358" fill="none" stroke="#000000"/>
</svg>
